spring.application.name=lifesync

# Database Configuration
# Using H2 for rapid local development matching the project requirements.
# If PostgreSQL is preferred, you can uncomment the following and comment out H2
# spring.datasource.url=jdbc:postgresql://localhost:5432/lifesync
# spring.datasource.username=postgres
# spring.datasource.password=password

spring.datasource.url=jdbc:h2:mem:lifesync
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server port
server.port=8080
